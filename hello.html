<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Typing Animation Example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
  <style>
    .typing-text {
      overflow: hidden;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .15em;
      position: relative;
    }

    .typing-text::after {
      content: '|';
      position: absolute;
      right: -0.1em;
      animation: typing 3s steps(30, end) infinite, blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      0% {
        width: 0;
      }
      25% {
        width: 25%;
      }
      50% {
        width: 100%;
      }
      75% {
        width: 75%;
      }
      100% {
        width: 100%;
      }
    }

    @keyframes blink-caret {
      from,
      to {
        border-color: transparent;
      }
      50% {
        border-color: orange;
      }
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row">
      <div class="col-md-6 mx-auto text-center">
        <h1 class="display-4">Text Typing Animation</h1>
        <p class="lead">Simulate the effect of typing out text using CSS and Bootstrap.</p>
        <p class="typing-text">developer</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
